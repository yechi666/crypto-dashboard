services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-dashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto
      POSTGRES_DB: crypto_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto -d crypto_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional lightweight DB browser: http://localhost:8081
  # (moved off 8080 so the client's nginx container can use that port)
  adminer:
    image: adminer:4
    container_name: crypto-dashboard-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: crypto-dashboard-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://crypto:crypto@postgres:5432/crypto_dashboard?schema=public"
      COINCAP_API_KEY: "${COINCAP_API_KEY:-}"
      PORT: "4000"
    ports:
      - "4000:4000"
    restart: unless-stopped
    # Readiness, deliberately — it's the more meaningful "can this container
    # serve" signal, verifying both the process and DB reachability. Readiness
    # is DB-only (no COINCAP_API_KEY dependency), so it won't report unhealthy
    # forever without a key, and the server already depends_on postgres.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: crypto-dashboard-client
    depends_on:
      - server
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  pgdata:
