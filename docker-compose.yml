services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-dashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto
      POSTGRES_DB: crypto_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto -d crypto_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional lightweight DB browser: http://localhost:8080
  adminer:
    image: adminer:4
    container_name: crypto-dashboard-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
